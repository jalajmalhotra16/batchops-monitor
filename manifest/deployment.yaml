apiVersion: apps/v1
kind: Deployment
metadata:
  name: batchops-monitor
  labels:
    app: batchops-monitor
spec:
  replicas: 1  # Number of pod replicas
  selector:
    matchLabels:
      app: batchops-monitor
  template:
    metadata:
      labels:
        app: batchops-monitor
    spec:
      serviceAccountName: batchops-monitor
      containers:
        - name: batchops-monitor
          image: batchops_cron:v2.2
          imagePullPolicy: IfNotPresent 
          ports:
            - containerPort: 5000
          env:
            - name: ENVIRONMENT
              value: "test"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20


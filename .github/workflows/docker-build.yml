name: Build Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Backend Image
        run: |
          docker build \
            -t batchops-backend:test \
            .

      - name: Build Frontend Image
        run: |
          docker build \
            -t batchops-frontend:test \
            ./frontend
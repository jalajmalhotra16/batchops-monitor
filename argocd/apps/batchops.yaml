apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: batchops-monitor-app
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://github.com/jalajmalhotra16/batchops-monitor.git
      targetRevision: main
      path: helm/batchops/

      helm:
        valueFiles:
          - $values/gitops/apps/batchops-monitor.yaml

    - repoURL: https://github.com/jalajmalhotra16/batchops-monitor.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true 
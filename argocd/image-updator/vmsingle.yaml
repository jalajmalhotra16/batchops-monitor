apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-metrics
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/jalajmalhotra16/batchops-monitor.git
    targetRevision: main
    path: gitops/image-updator/vmsingle.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: vm

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: main-app
  namespace: default
spec:
  project: default

  source:
    repoURL: https://github.com/jalajmalhotra16/batchops-monitor.git
    targetRevision: main
    path: argocd/apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true